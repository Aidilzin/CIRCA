name: CIRCA CI

on:
  push:
    branches: [ "main", "master", "dev" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  test:
    name: pytest (${{ matrix.python-version }})
    runs-on: windows-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install CI dependencies
        run: |
          python -m pip install --upgrade pip
          # Install test dependencies only — skip heavy ML libs (torch, ultralytics)
          # which are not needed for unit/UI tests.
          pip install pytest pytest-cov
          pip install PyQt6>=6.4.0 opencv-python>=4.8.0 numpy>=1.24.0,<2.0.0
          pip install pyyaml>=6.0.0

      - name: Run tests (excluding training engine integration tests)
        run: |
          pytest tests/ \
            --ignore=tests/test_performance.py \
            -v \
            --tb=short \
            -k "not integration_smoke"
        env:
          # Prevent PyQt6 from trying to open a display in CI
          QT_QPA_PLATFORM: offscreen
          # Keep W&B silent in CI
          WANDB_MODE: disabled
